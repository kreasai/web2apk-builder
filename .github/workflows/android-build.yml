name: Android Build (Web2APK)

on:
  workflow_dispatch:
    inputs:
      job_id:
        required: true
        type: string
      source_type:
        required: true
        type: string
      source_url:
        required: false
        type: string
      icon_path:
        required: false
        type: string
      app_name:
        required: true
        type: string
      package_name:
        required: true
        type: string
      version_name:
        required: true
        type: string
      version_code:
        required: true
        type: string
      permissions:
        required: false
        type: string
      features:
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JOB_ID: ${{ github.event.inputs.job_id }}
      SOURCE_TYPE: ${{ github.event.inputs.source_type }}
      SOURCE_URL: ${{ github.event.inputs.source_url }}
      APP_NAME: ${{ github.event.inputs.app_name }}
      PACKAGE_NAME: ${{ github.event.inputs.package_name }}
      VERSION_NAME: ${{ github.event.inputs.version_name }}
      VERSION_CODE: ${{ github.event.inputs.version_code }}
      ICON_PATH: ${{ github.event.inputs.icon_path }}
      PERMISSIONS_JSON: ${{ github.event.inputs.permissions }}
      FEATURES_JSON: ${{ github.event.inputs.features }}
      WEB2APK_CALLBACK_URL: ${{ secrets.WEB2APK_CALLBACK_URL }}
      WEB2APK_CALLBACK_TOKEN: ${{ secrets.WEB2APK_CALLBACK_TOKEN }}
    steps:
      - name: Notify running
        shell: bash
        run: |
          if [ -n "$WEB2APK_CALLBACK_URL" ] && [ -n "$WEB2APK_CALLBACK_TOKEN" ]; then
            curl -sS -X POST "$WEB2APK_CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -H "X-WEB2APK-CALLBACK-TOKEN: $WEB2APK_CALLBACK_TOKEN" \
              -d "{\"job_id\":$JOB_ID,\"status\":\"running\",\"progress\":20,\"message\":\"Initializing Android build runner\"}" >/dev/null || true
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare web source and build flags
        shell: bash
        run: |
          mkdir -p android-template/app/src/main/assets
          rm -rf android-template/app/src/main/assets/*

          WEB_URL="$SOURCE_URL"
          if [ "$SOURCE_TYPE" = "zip" ]; then
            SOURCE_ENDPOINT="${WEB2APK_CALLBACK_URL%/callback}/source/${JOB_ID}?token=${WEB2APK_CALLBACK_TOKEN}"
            curl -fL "$SOURCE_ENDPOINT" -o /tmp/source.zip
            unzip -o /tmp/source.zip -d android-template/app/src/main/assets
            WEB_URL="file:///android_asset/index.html"
          fi

          export WEB_URL
          python3 - <<'PY' >> "$GITHUB_ENV"
          import json
          import os

          features = {}
          permissions = []
          try:
              features = json.loads(os.environ.get("FEATURES_JSON") or "{}")
          except Exception:
              features = {}
          try:
              permissions = json.loads(os.environ.get("PERMISSIONS_JSON") or "[]")
          except Exception:
              permissions = []

          def as_bool(value, default):
              if isinstance(value, bool):
                  return "true" if value else "false"
              return "true" if default else "false"

          print(f"WEB2APK_WEB_URL={os.environ.get('WEB_URL', '')}")
          print(f"WEB2APK_PERMISSIONS_CSV={','.join([str(x) for x in permissions])}")
          print(f"WEB2APK_ENABLE_SWIPE_REFRESH={as_bool(features.get('enable_swipe_refresh'), True)}")
          print(f"WEB2APK_ENABLE_EXTERNAL_APPS={as_bool(features.get('enable_external_apps'), True)}")
          print(f"WEB2APK_ENABLE_OFFLINE_PAGE={as_bool(features.get('enable_offline_page'), True)}")
          print(f"WEB2APK_ENABLE_BACK_NAVIGATION={as_bool(features.get('enable_back_navigation'), True)}")
          print(f"WEB2APK_ENABLE_SPLASH={as_bool(features.get('enable_splash'), False)}")
          print(f"WEB2APK_SPLASH_BG={str(features.get('splash_background_color') or '#111827')}")
          print(f"WEB2APK_SPLASH_LOGO={str(features.get('splash_logo_url') or '')}")
          PY


      - name: Download icon
        shell: bash
        run: |
          if [ -n "$ICON_PATH" ]; then
            ICON_ENDPOINT="${WEB2APK_CALLBACK_URL%/callback}/icon/${JOB_ID}?token=${WEB2APK_CALLBACK_TOKEN}"
            curl -fL "$ICON_ENDPOINT" -o /tmp/icon.png
            
            # Create standard res folders
            mkdir -p android-template/app/src/main/res/mipmap-mdpi
            mkdir -p android-template/app/src/main/res/mipmap-hdpi
            mkdir -p android-template/app/src/main/res/mipmap-xhdpi
            mkdir -p android-template/app/src/main/res/mipmap-xxhdpi
            mkdir -p android-template/app/src/main/res/mipmap-xxxhdpi
            
            # Overwrite the default icon
            cp /tmp/icon.png android-template/app/src/main/res/mipmap-mdpi/ic_launcher.png
            cp /tmp/icon.png android-template/app/src/main/res/mipmap-hdpi/ic_launcher.png
            cp /tmp/icon.png android-template/app/src/main/res/mipmap-xhdpi/ic_launcher.png
            cp /tmp/icon.png android-template/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
            cp /tmp/icon.png android-template/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
            
            # Make ic_launcher_round if exists, to ensure uniformity
            cp /tmp/icon.png android-template/app/src/main/res/mipmap-mdpi/ic_launcher_round.png || true
            cp /tmp/icon.png android-template/app/src/main/res/mipmap-hdpi/ic_launcher_round.png || true
            cp /tmp/icon.png android-template/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png || true
            cp /tmp/icon.png android-template/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png || true
            cp /tmp/icon.png android-template/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png || true
          fi

      - name: Build debug APK + unsigned release AAB
        shell: bash
        run: |
          cd android-template
          gradle --no-daemon assembleDebug bundleRelease \
            -Pweb2apkAppName="$APP_NAME" \
            -Pweb2apkApplicationId="$PACKAGE_NAME" \
            -Pweb2apkVersionName="$VERSION_NAME" \
            -Pweb2apkVersionCode="$VERSION_CODE" \
            -Pweb2apkWebUrl="$WEB2APK_WEB_URL" \
            -Pweb2apkPermissionsCsv="$WEB2APK_PERMISSIONS_CSV" \
            -Pweb2apkEnableSwipeRefresh="$WEB2APK_ENABLE_SWIPE_REFRESH" \
            -Pweb2apkEnableExternalApps="$WEB2APK_ENABLE_EXTERNAL_APPS" \
            -Pweb2apkEnableOfflinePage="$WEB2APK_ENABLE_OFFLINE_PAGE" \
            -Pweb2apkEnableBackNavigation="$WEB2APK_ENABLE_BACK_NAVIGATION" \
            -Pweb2apkEnableSplash="$WEB2APK_ENABLE_SPLASH" \
            -Pweb2apkSplashBackgroundColor="$WEB2APK_SPLASH_BG" \
            -Pweb2apkSplashLogoUrl="$WEB2APK_SPLASH_LOGO"

      - name: Upload build artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-apk-${{ github.event.inputs.job_id }}
          path: android-template/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload unsigned AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-aab-${{ github.event.inputs.job_id }}
          path: android-template/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Notify success
        if: success()
        shell: bash
        run: |
          if [ -n "$WEB2APK_CALLBACK_URL" ] && [ -n "$WEB2APK_CALLBACK_TOKEN" ]; then
            curl -sS -X POST "$WEB2APK_CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -H "X-WEB2APK-CALLBACK-TOKEN: $WEB2APK_CALLBACK_TOKEN" \
              -d "{\"job_id\":$JOB_ID,\"status\":\"success\",\"stage\":\"builder\",\"progress\":100,\"message\":\"Builder workflow completed\",\"github_run_id\":${GITHUB_RUN_ID},\"artifact_name\":\"web2apk-apk-${JOB_ID}\",\"artifact_name_aab\":\"web2apk-aab-${JOB_ID}\"}" >/dev/null || true
          fi

      - name: Notify failure
        if: failure()
        shell: bash
        run: |
          if [ -n "$WEB2APK_CALLBACK_URL" ] && [ -n "$WEB2APK_CALLBACK_TOKEN" ]; then
            curl -sS -X POST "$WEB2APK_CALLBACK_URL" \
              -H "Content-Type: application/json" \
              -H "X-WEB2APK-CALLBACK-TOKEN: $WEB2APK_CALLBACK_TOKEN" \
              -d "{\"job_id\":$JOB_ID,\"status\":\"failed\",\"stage\":\"builder\",\"progress\":100,\"error_message\":\"Builder workflow failed\"}" >/dev/null || true
          fi
